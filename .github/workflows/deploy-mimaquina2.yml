name: Deploy to mimaquina2

on:
  push:
    branches:
      - main
      - codex/google-sso
  workflow_dispatch:

concurrency:
  group: mimaquina2-deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, mimaquina2, deploy]
    timeout-minutes: 30
    steps:
      - name: Deploy changed services
        run: sudo /root/apps/stack/bin/deploy-pull.sh
